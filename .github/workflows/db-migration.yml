name: Database Migration

on:
  workflow_dispatch:
    inputs:
      migration_action:
        description: "Migration action"
        required: true
        type: choice
        options:
          - migrate
          - status
          - rollback-last

jobs:
  migrate:
    name: Run Migration (UAT)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ vars.DOTNET_VERSION || '10.0.x' }}

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Build solution
        run: dotnet build BankingSystem/BankingSystem.slnx --configuration Release

      - name: Check migration status
        if: inputs.migration_action == 'status'
        run: |
          dotnet ef migrations list \
            --project BankingSystem/Banking.Infrastructure \
            --startup-project BankingSystem/Banking.Api \
            --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}

      - name: Apply pending migrations
        if: inputs.migration_action == 'migrate'
        run: |
          echo "Applying migrations to UAT..."
          dotnet ef database update \
            --project BankingSystem/Banking.Infrastructure \
            --startup-project BankingSystem/Banking.Api \
            --no-build \
            --verbose
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
          ASPNETCORE_ENVIRONMENT: Production

      - name: Rollback last migration
        if: inputs.migration_action == 'rollback-last'
        run: |
          echo "Rolling back last migration on UAT..."
          # Filter migration names by timestamp prefix pattern
          MIGRATIONS=$(dotnet ef migrations list \
            --project BankingSystem/Banking.Infrastructure \
            --startup-project BankingSystem/Banking.Api \
            --no-build \
            2>/dev/null | grep -E "^[0-9]{14}_")

          TOTAL=$(echo "$MIGRATIONS" | wc -l)
          if [ "$TOTAL" -lt 2 ]; then
            echo "ERROR: Only $TOTAL migration(s) found — cannot rollback further"
            exit 1
          fi

          PREVIOUS=$(echo "$MIGRATIONS" | tail -2 | head -1 | xargs)
          echo "Rolling back to: $PREVIOUS"
          dotnet ef database update "$PREVIOUS" \
            --project BankingSystem/Banking.Infrastructure \
            --startup-project BankingSystem/Banking.Api \
            --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
          ASPNETCORE_ENVIRONMENT: Production
