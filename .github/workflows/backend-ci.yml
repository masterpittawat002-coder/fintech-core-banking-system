name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "BankingSystem/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "BankingSystem/**"

env:
  DOTNET_VERSION: ${{ vars.DOTNET_VERSION || '10.0.x' }}
  SOLUTION_PATH: "BankingSystem/BankingSystem.slnx"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: banking_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: banking_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test BankingSystem/Banking.Tests.Unit \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results/unit

      - name: Run Integration Tests
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=banking_test;Username=banking_test;Password=test_password"
          ConnectionStrings__Redis: "localhost:6379"
          Jwt__Key: "TestSecretKeyForCICD_AtLeast256Bits!!"
          Jwt__Issuer: "BankingSystem.Test"
          Jwt__Audience: "BankingSystem.Test"
          ASPNETCORE_ENVIRONMENT: "Testing"
        run: |
          dotnet test BankingSystem/Banking.Tests.Integration \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --results-directory ./test-results/integration

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/
          retention-days: 7
